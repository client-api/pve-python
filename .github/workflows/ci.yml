name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f test-requirements.txt ]; then
            pip install -r test-requirements.txt
          fi

      - name: Syntax check (every module parses)
        run: |
          python - <<'PY'
          import ast, glob, sys
          bad = []
          for f in glob.glob('pve_client/**/*.py', recursive=True):
              try: ast.parse(open(f).read())
              except SyntaxError as e: bad.append((f, str(e)))
          if bad:
              for f, e in bad: print(f, e)
              sys.exit(1)
          PY

      - name: Import check
        run: python -c "import pve_client; print(pve_client.__version__)"
