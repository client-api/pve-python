name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pve:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install package + test deps
        # Install test deps explicitly rather than via `[test]` extras: the
        # generator overwrites pyproject.toml on each regen and currently drops
        # `[project.optional-dependencies]`. Until the upstream Mustache
        # template carries the block, the workflow owns the deps list.
        run: |
          pip install -e .
          pip install 'pytest>=8' 'pytest-timeout>=2.3' 'requests>=2.32'

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start PVE test container
        id: proxmox
        uses: client-api/proxmox-docker-action@v1
        with:
          product: pve
          tag: '9.2'
          enable-kvm: auto

      - name: Run E2E tests
        run: pytest e2e/ -v --tb=short
        env:
          PROXMOX_INSECURE: '1'
          PROXMOX_KVM_AVAILABLE: ${{ steps.proxmox.outputs.kvm-available }}
          PROXMOX_CGROUPV2_AVAILABLE: ${{ steps.proxmox.outputs.cgroupv2-available }}
